<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台北駅 地下街 3Dマップ｜台湾 食べ歩き</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --paper: #fdfbf4;
      --card: #ffffff;
      --ink: #23201a;
      --ink2: #5b5345;
      --muted: #9a9080;
      --line: #efe7d6;
      --line2: #dccfb8;
      --accent: #f15a35;
      --sun: #ffd24d;
      --tactic: #0e9fb3;
      --c-y: #f2a517;
      --c-z: #1fa15f;
      --c-k: #b0413e;
      --c-r: #7c5cdb;
      --c-mrt: #0e9fb3;
      --c-tra: #9a7b3f;
      --c-air: #8246af;
      --ln-red: #e3002c;
      --ln-blue: #0070bd;
      --sans: "Zen Kaku Gothic New", system-ui, sans-serif;
      --grotesk: "Archivo", system-ui, sans-serif;
      --shadow: 0 1px 2px rgba(60, 40, 25, .06), 0 14px 30px -18px rgba(60, 40, 25, .28);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0; height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      touch-action: none;
      overscroll-behavior: none;
    }

    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }

    /* ================= CSS2D labels ================= */
    .lbl {
      pointer-events: none;
      white-space: nowrap;
      font-family: var(--sans);
      transform: translate(-50%, -50%);
    }
    .lbl.zone {
      font-weight: 900; font-size: 12px; letter-spacing: .03em;
      padding: 3px 10px; border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      border: 1.5px solid currentColor;
      box-shadow: 0 2px 8px rgba(60, 40, 25, .18);
    }
    .lbl.exit {
      font-weight: 800; font-size: 9px; letter-spacing: .04em;
      padding: 1px 5px; border-radius: 5px;
      background: rgba(35, 32, 26, .85); color: #fff;
      transition: opacity .3s;
    }
    .lbl.spot {
      font-weight: 700; font-size: 10.5px; color: var(--ink2);
      text-shadow: 0 1px 3px rgba(253,251,244,.95), 0 0 6px rgba(253,251,244,.9);
      transition: opacity .3s;
    }
    .lbl.st {
      font-weight: 700; font-size: 9.5px; color: #a99e8c;
      letter-spacing: .12em;
      text-shadow: 0 1px 3px rgba(253,251,244,.95);
      transition: opacity .3s;
    }
    .lbl.dir {
      font-weight: 800; font-size: 10.5px; color: var(--accent);
      background: rgba(255, 255, 255, .9); padding: 2px 9px; border-radius: 999px;
      border: 1.2px dashed var(--accent);
    }
    .lbl.floor-tag {
      font-family: var(--grotesk);
      font-weight: 800; font-size: 13px; letter-spacing: .1em;
      padding: 4px 12px; border-radius: 8px;
      background: var(--ink); color: var(--paper);
      box-shadow: 0 3px 10px rgba(60, 40, 25, .3);
    }
    .lbl.floor-tag small {
      font-family: var(--sans); font-weight: 700; font-size: 10px;
      letter-spacing: 0; margin-left: 7px; opacity: .75;
    }
    .far .lbl.exit, .far .lbl.spot, .far .lbl.st { opacity: 0; }

    /* ================= panels ================= */
    .panel {
      position: fixed; z-index: 10;
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--line2);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    /* ---- header ---- */
    #head {
      top: 12px; left: 12px;
      width: min(330px, calc(100vw - 24px));
      padding: 14px 16px 12px;
    }
    #head .hrow { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    #head .kicker {
      font-family: var(--grotesk); font-weight: 800; font-size: 9.5px;
      letter-spacing: .2em; text-transform: uppercase; color: var(--accent);
    }
    #head h1 { margin: 2px 0 0; font-size: 17px; font-weight: 900; letter-spacing: .01em; }
    #fold {
      flex: none; appearance: none; cursor: pointer;
      width: 26px; height: 26px; border-radius: 8px;
      border: 1px solid var(--line2); background: var(--paper);
      color: var(--ink2); font-size: 12px; line-height: 1;
      transition: transform .25s;
    }
    #head.folded #fold { transform: rotate(180deg); }
    #head .body { overflow: hidden; max-height: 600px; transition: max-height .3s ease, opacity .25s; }
    #head.folded .body { max-height: 0; opacity: 0; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 4px 10px;
      margin-top: 9px; padding-top: 9px; border-top: 1px dashed var(--line2);
    }
    .legend span {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: var(--ink2);
    }
    .legend i {
      width: 8px; height: 8px; border-radius: 3px; flex: none;
      background: var(--c, #999);
    }

    .sec {
      margin-top: 10px;
      font-family: var(--grotesk); font-weight: 800; font-size: 9px;
      letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .chip {
      appearance: none; cursor: pointer;
      font-family: var(--sans); font-weight: 700; font-size: 11px;
      padding: 5px 11px; border-radius: 999px;
      border: 1.5px solid var(--line2);
      background: var(--paper); color: var(--ink2);
      transition: all .15s;
    }
    .chip:hover { border-color: var(--muted); }
    .chip.view.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.route { border-style: dashed; }
    .chip.route.on { background: var(--tactic); border-color: var(--tactic); border-style: solid; color: #fff; }

    #head .back {
      display: inline-block; margin-top: 11px;
      font-size: 11px; font-weight: 700; color: var(--tactic); text-decoration: none;
    }

    /* ---- elevator floor rail ---- */
    #rail {
      top: 50%; right: 12px; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 7px;
      gap: 4px;
    }
    #rail .flr {
      appearance: none; cursor: pointer;
      width: 40px; height: 34px; border-radius: 10px;
      border: 1.5px solid transparent;
      background: none; position: relative;
      font-family: var(--grotesk); font-weight: 800; font-size: 12px;
      color: var(--ink2);
      transition: all .15s;
    }
    #rail .flr:hover { background: var(--paper); }
    #rail .flr.on {
      background: var(--ink); color: var(--paper);
      box-shadow: 0 3px 10px rgba(35, 32, 26, .35);
    }
    #rail .flr i {
      position: absolute; left: 4px; top: 4px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--c, transparent);
    }
    #rail hr { width: 26px; border: 0; border-top: 1px dashed var(--line2); margin: 2px 0; }
    #rail .tool {
      appearance: none; cursor: pointer;
      width: 40px; height: 34px; border-radius: 10px;
      border: 1.5px solid var(--line2); background: var(--paper);
      font-size: 14px; color: var(--ink2);
      transition: all .15s;
    }
    #rail .tool.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    #rail .cap {
      font-family: var(--grotesk); font-weight: 800; font-size: 8px;
      letter-spacing: .1em; color: var(--muted); margin-top: 1px;
    }

    /* ---- compass ---- */
    #compass {
      position: fixed; z-index: 10;
      top: 12px; right: 12px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line2);
      box-shadow: var(--shadow);
      display: grid; place-items: center;
      pointer-events: none;
    }
    #needle { width: 30px; height: 30px; }

    /* ---- info bottom sheet ---- */
    #info {
      bottom: 12px; left: 50%;
      width: min(470px, calc(100vw - 24px));
      transform: translate(-50%, 130%);
      transition: transform .3s cubic-bezier(.2, .9, .25, 1);
      overflow: hidden;
      padding: 0;
    }
    #info.show { transform: translate(-50%, 0); }
    #info .bar { height: 5px; background: var(--bar, var(--accent)); }
    #info .inner { padding: 12px 16px 13px; position: relative; }
    #info .iname { font-weight: 900; font-size: 14.5px; padding-right: 26px; line-height: 1.4; }
    #info .badges { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    #info .bdg {
      display: inline-block; padding: 1.5px 9px;
      font-size: 10px; font-weight: 800; border-radius: 999px;
      color: #fff; background: var(--b, var(--muted));
      font-family: var(--grotesk); letter-spacing: .05em;
    }
    #info .bdg.ghost { background: var(--paper); color: var(--ink2); border: 1px solid var(--line2); }
    #info .idesc { margin-top: 7px; font-size: 12px; color: var(--ink2); line-height: 1.7; }
    #info .idesc b { color: var(--ink); }
    #info .iclose {
      position: absolute; top: 9px; right: 10px; cursor: pointer;
      width: 24px; height: 24px; border-radius: 8px;
      border: 0; background: var(--paper); color: var(--muted); font-size: 13px;
    }

    /* ---- toast ---- */
    #toast {
      position: fixed; z-index: 11;
      bottom: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(35, 32, 26, .92); color: var(--paper);
      font-size: 11.5px; font-weight: 700;
      padding: 9px 18px; border-radius: 999px;
      box-shadow: var(--shadow);
      opacity: 0; pointer-events: none;
      transition: opacity .5s;
      max-width: calc(100vw - 40px); text-align: center;
    }
    #toast.show { opacity: 1; }

    #note {
      position: fixed; z-index: 9;
      bottom: 10px; right: 12px;
      font-size: 9.5px; color: var(--muted);
      pointer-events: none;
      text-align: right; line-height: 1.5;
    }

    @media (max-width: 640px) {
      #head { width: calc(100vw - 86px); }
      #rail { right: 8px; padding: 6px 5px; }
      #rail .flr { width: 36px; height: 31px; font-size: 11px; }
      #rail .tool { width: 36px; height: 31px; }
      #compass { top: auto; bottom: 64px; right: 8px; width: 38px; height: 38px; }
      #note { display: none; }
      #info { bottom: 8px; }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="app"></div>

  <!-- header -->
  <div class="panel" id="head">
    <div class="hrow">
      <div>
        <div class="kicker">Taipei Main Station — Underground City</div>
        <h1>台北駅 地下街 3Dマップ</h1>
      </div>
      <button id="fold" title="折りたたみ">▴</button>
    </div>
    <div class="body">
      <div class="legend">
        <span><i style="--c:#f2a517"></i>Y区 台北地下街</span>
        <span><i style="--c:#1fa15f"></i>Z区 站前</span>
        <span><i style="--c:#b0413e"></i>K区 誠品</span>
        <span><i style="--c:#7c5cdb"></i>R区 中山</span>
        <span><i style="--c:#0070bd"></i>BL線</span>
        <span><i style="--c:#e3002c"></i>R線</span>
        <span><i style="--c:#9a7b3f"></i>台鉄・高鉄</span>
        <span><i style="--c:#8246af"></i>機捷(空港)</span>
      </div>

      <div class="sec">View / 視点</div>
      <div class="chips" id="views">
        <button class="chip view" data-v="all">全体</button>
        <button class="chip view" data-v="mrt">MRT乗換</button>
        <button class="chip view" data-v="y">Y区・京站</button>
        <button class="chip view" data-v="z">Z区・站前</button>
        <button class="chip view" data-v="air">機捷A1</button>
      </div>

      <div class="sec">Route / 歩行ルート再生</div>
      <div class="chips" id="routes">
        <button class="chip route" data-r="0">BL→R線 乗換</button>
        <button class="chip route" data-r="1">台鉄→Y区→京站</button>
        <button class="chip route" data-r="2">Z区→新光三越</button>
        <button class="chip route" data-r="3">帰国日: →機捷A1</button>
      </div>

      <a class="back" href="index.html">← しおりに戻る</a>
    </div>
  </div>

  <!-- elevator rail -->
  <div class="panel" id="rail">
    <button class="flr" data-f="F2">2F<i style="--c:#e8a33d"></i></button>
    <button class="flr" data-f="F1">1F<i style="--c:#9a9080"></i></button>
    <button class="flr" data-f="B1">B1<i style="--c:#f2a517"></i></button>
    <button class="flr" data-f="B2">B2<i style="--c:#9a7b3f"></i></button>
    <button class="flr" data-f="B3">B3<i style="--c:#0070bd"></i></button>
    <button class="flr" data-f="B4">B4<i style="--c:#e3002c"></i></button>
    <hr>
    <button class="tool" id="btnAll" title="全フロア表示">⛶</button>
    <button class="tool" id="btnExplode" title="フロア分解表示">⇕</button>
    <div class="cap">FLOOR</div>
  </div>

  <!-- compass -->
  <div id="compass">
    <svg id="needle" viewBox="0 0 40 40">
      <polygon points="20,5 25,22 20,19 15,22" fill="#f15a35" />
      <polygon points="20,35 25,18 20,21 15,18" fill="#c9bda4" />
      <text x="20" y="14" text-anchor="middle" font-size="7" font-weight="800" fill="#23201a"
        font-family="Archivo,sans-serif">N</text>
    </svg>
  </div>

  <!-- info sheet -->
  <div class="panel" id="info">
    <div class="bar" id="ibar"></div>
    <div class="inner">
      <button class="iclose" id="iclose">✕</button>
      <div class="iname" id="iname"></div>
      <div class="badges" id="ibadges"></div>
      <div class="idesc" id="idesc"></div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="note">公式情報（台北捷運・台鉄・桃園捷運・各地下街）を元にした概略図<br>位置・縮尺は模式化しています。現地の案内表示を優先してください。</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    /* ============================================================
       座標系: 1unit ≒ 1m / +X=東 / +Z=南 / +Y=上（概略スケール）

       実際の階層構成（公式情報に基づく）:
         2F  微風台北車站（美食街）
         1F  台鉄・高鉄 切符売場・大廳（チェック柄の床）
         B1  台鉄・高鉄改札 ＋ 地下街網（Y・Z・K・R区／機捷連絡）
         B2  台鉄(3・4月台)・高鉄(1・2月台)ホーム ＋ 捷運大廳(板南線改札)
         B3  板南線ホーム（忠孝西路下・東西）＋ 淡水信義線大廳（公園路下）
         B4  淡水信義線ホーム（公園路下・南北）
       ============================================================ */

    const COL = {
      paper: 0xfdfbf4, ink: 0x23201a,
      street: 0xe9dfca, park: 0xcfe4c4, bldg: 0xded3bd,
      tra: 0x9a7b3f, mrt: 0x0e9fb3,
      y: 0xf2a517, z: 0x1fa15f, k: 0xb0413e, r: 0x7c5cdb,
      air: 0x8246af, airDark: 0x5e3083,
      lnRed: 0xe3002c, lnBlue: 0x0070bd, lnGreen: 0x0a8f54,
      platform: 0xcec6b4, track: 0x47423a,
      conn: 0xffd24d, route: 0xf15a35,
      breeze: 0xe8a33d
    };
    const hex = c => '#' + c.toString(16).padStart(6, '0');

    /* ---------- フロア定義 ---------- */
    const FLOORS = {
      F2: { y: 14,  ey: 110,  jp: '微風美食街',              bounds: [-105, 105, -92, 18] },
      F1: { y: 0,   ey: 50,   jp: '地上・駅舎',               bounds: null },
      B1: { y: -12, ey: -30,  jp: '地下街・台鉄高鉄改札',      bounds: [-665, 270, -500, 120] },
      B2: { y: -24, ey: -105, jp: '台鉄・高鉄ホーム／捷運大廳', bounds: [-445, 165, -105, 100] },
      B3: { y: -34, ey: -170, jp: 'BL線ホーム／R線大廳',      bounds: [-130, 200, -80, 95] },
      B4: { y: -44, ey: -235, jp: 'R線（淡水信義線）ホーム',   bounds: [130, 200, -75, 115] }
    };
    const FKEY = Object.keys(FLOORS);

    /* ---------- scene ---------- */
    const app = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(COL.paper);
    scene.fog = new THREE.Fog(COL.paper, 1100, 2600);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 5000);
    camera.position.set(-150, 1000, 1250);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(-110, -15, -20);
    controls.enableDamping = true;
    controls.dampingFactor = .08;
    controls.maxPolarAngle = Math.PI * .495;
    controls.minDistance = 50;
    controls.maxDistance = 1800;

    scene.add(new THREE.AmbientLight(0xffffff, 1.05));
    const sun = new THREE.DirectionalLight(0xfff3df, 1.5);
    sun.position.set(-350, 600, 300);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xe8f2ff, .5);
    fill.position.set(300, 200, -400);
    scene.add(fill);

    /* ---------- floor groups ---------- */
    const F = {};
    for (const k of FKEY) {
      F[k] = new THREE.Group();
      F[k].position.y = FLOORS[k].y;
      scene.add(F[k]);
    }
    const gRoute = new THREE.Group();
    scene.add(gRoute);

    const pickables = [];

    /* ---------- helpers ---------- */
    function makeLabel(text, cls, color) {
      const div = document.createElement('div');
      div.className = 'lbl ' + cls;
      div.innerHTML = text;
      if (color) div.style.color = color;
      return new CSS2DObject(div);
    }

    function mat(color, opacity) {
      const m = new THREE.MeshLambertMaterial({
        color, transparent: true, opacity: opacity ?? 1
      });
      m.userData.baseOp = opacity ?? 1;
      return m;
    }

    /* box(floorKey, x1,x2, z1,z2, h, color, opts) — 底面はフロアのローカルy0 */
    function box(fk, x1, x2, z1, z2, h, color, o = {}) {
      const w = x2 - x1, d = z2 - z1;
      const geo = new THREE.BoxGeometry(w, h, d);
      const m = new THREE.Mesh(geo, mat(color, o.opacity));
      m.position.set(x1 + w / 2, (o.dy ?? 0) + h / 2, z1 + d / 2);
      m.userData.floor = fk;
      if (o.name) {
        m.userData.info = { name: o.name, desc: o.desc || '', tag: o.tag, color: o.color || hex(color), floor: fk };
        pickables.push(m);
      }
      if (o.edges !== false && h > 1.4) {
        const eMat = new THREE.LineBasicMaterial({ color: COL.ink, transparent: true, opacity: .15 });
        eMat.userData.baseOp = .15;
        m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), eMat));
      }
      if (o.label) {
        const l = makeLabel(o.label, o.labelCls || 'zone', o.labelColor || hex(color));
        l.position.set(o.lx ?? 0, h / 2 + (o.ly ?? 5), o.lz ?? 0);
        m.add(l);
      }
      if (o.rotY) m.rotation.y = o.rotY;
      if (o.cx !== undefined) m.position.set(o.cx, (o.dy ?? 0) + h / 2, o.cz);
      F[fk].add(m);
      return m;
    }

    function exitMarker(fk, x, z, color, id, desc) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 2.4, 15, 10), mat(color));
      m.position.set(x, 7.5, z);
      m.userData.floor = fk;
      m.userData.info = { name: '出口 ' + id, desc, tag: '出口', color: hex(color), floor: fk };
      pickables.push(m);
      const l = makeLabel(id, 'exit');
      l.position.y = 10;
      m.add(l);
      F[fk].add(m);
    }

    function poi(fk, x, z, color, name, desc, labelText) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(3.4, 14, 14), mat(color));
      m.position.set(x, 7, z);
      m.userData.floor = fk;

        g.add(car);

      g.userData = { axis, from, to, speed, phase: Math.random() };
      F[fk].add(g);
      trains.push(g);

    let routeTube = null, routeBall = null, routeCurve = null, routeT = 0, activeRoute = -1;

    function routePts(i) {
      return ROUTES[i].pts.map(p => new THREE.Vector3(p[0], F[p[2]].position.y + 4, p[1]));
    }
    function buildRouteGeo(i) {
      routeCurve = new THREE.CatmullRomCurve3(routePts(i), false, 'catmullrom', .08);
      if (routeTube) { routeTube.geometry.dispose(); gRoute.remove(routeTube); }
      routeTube = new THREE.Mesh(
        new THREE.TubeGeometry(routeCurve, 110, 1.5, 8),
        new THREE.MeshBasicMaterial({ color: COL.route, transparent: true, opacity: .92 })
      );
      gRoute.add(routeTube);
    }
    function clearRoute() {
      if (routeTube) routeTube.geometry.dispose();
      gRoute.clear();
      routeTube = routeBall = routeCurve = null;
      activeRoute = -1;
      document.querySelectorAll('#routes .chip').forEach(c => c.classList.remove('on'));
    }
    function showRoute(i) {
      clearRoute();
      activeRoute = i;
      buildRouteGeo(i);
      routeBall = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16),

        new THREE.MeshBasicMaterial({ color: 0xffd24d, transparent: true, opacity: .3 }));

    // ヘッダー折りたたみ

    // ---- フロア絞り込み ----
    let FOCUS = null;
    function applyFocus() {
      for (const k of FKEY) {
        const active = !FOCUS || FOCUS === k;
        F[k].traverse(o => {
          if (o.isMesh || o.isLineSegments || o.isLine) {
            const mt = o.material;
            if (mt && mt.userData) {
              const b = mt.userData.baseOp ?? 1;
              mt.opacity = active ? b : b * .06;
              mt.depthWrite = active;
            }
          }
          if (o.isCSS2DObject) o.visible = active;
        });
      }
      for (const m of connMeshes) {
        const c = m.userData.conn;
        const active = !FOCUS || FOCUS === c.a || FOCUS === c.b;
        m.material.opacity = active ? m.material.userData.baseOp : .05;
      }
      document.querySelectorAll('#rail .flr').forEach(b =>
        b.classList.toggle('on', b.dataset.f === FOCUS));
    }
    document.getElementById('rail').addEventListener('click', e => {

        FOCUS = (FOCUS === b.dataset.f) ? null : b.dataset.f;
        applyFocus();
      }
    });

      all: { pos: [-130, 460, 520], tgt: [-110, -15, -20] },

      y: { pos: [-220, 230, 160], tgt: [-210, -10, -120] },
      z: { pos: [110, 190, 330], tgt: [-30, -10, 90] },
      air: { pos: [-540, 210, 150], tgt: [-330, -14, -65] }
    };
    let camAnim = null;
    function flyTo(v, dur = 1.4) {
      camAnim = {
        t: 0, dur,

      if (activeRoute === i) { clearRoute(); infoEl.classList.remove('show'); return; }

    // ---- クリック＆ホバー ----
    const ray = new THREE.Raycaster();
    const ptr = new THREE.Vector2();
    let downXY = null, hovered = null;

    function pickAt(cx, cy) {
      ptr.set((cx / innerWidth) * 2 - 1, -(cy / innerHeight) * 2 + 1);
      ray.setFromCamera(ptr, camera);
      const hits = ray.intersectObjects(pickables.filter(m => {
        const fk = m.userData.floor;
        if (fk === '_conn') {
          const c = m.userData.conn;
          return !FOCUS || FOCUS === c.a || FOCUS === c.b;
        }
        return !FOCUS || FOCUS === fk;
      }), false);
      return hits.length ? hits[0].object : null;
    }

    renderer.domElement.addEventListener('pointerdown', e => { downXY = [e.clientX, e.clientY]; });
    renderer.domElement.addEventListener('pointerup', e => {
      if (!downXY) return;
      const dx = e.clientX - downXY[0], dy = e.clientY - downXY[1];
      downXY = null;
      if (dx * dx + dy * dy > 40) return;
      const m = pickAt(e.clientX, e.clientY);
      if (m) showInfo(m.userData.info);
    });
    renderer.domElement.addEventListener('pointermove', e => {
      if (e.pointerType === 'touch') return;
      const m = pickAt(e.clientX, e.clientY);
      if (hovered && hovered !== m) {
        hovered.material.emissive?.setHex(0x000000);
        hovered = null;
      }
      if (m && m !== hovered) {
        hovered = m;
        m.material.emissive?.setHex(0x2a2208);
      }
      renderer.domElement.style.cursor = m ? 'pointer' : '';

       loop
       ============================================================ */
    updateConns();
    const clock = new THREE.Clock();
    let time = 0;

    function tick() {
      requestAnimationFrame(tick);
      const dt = Math.min(clock.getDelta(), .05);
      time += dt;

      if (camAnim) {
        camAnim.t = Math.min(1, camAnim.t + dt / camAnim.dur);
        const k = 1 - Math.pow(1 - camAnim.t, 3);
        camera.position.lerpVectors(camAnim.p0, camAnim.p1, k);
        controls.target.lerpVectors(camAnim.t0, camAnim.t1, k);
        if (camAnim.t >= 1) camAnim = null;
      }

      if (floorAnimating) {
        let done = true;
        for (const k of FKEY) {
          const target = exploded ? FLOORS[k].ey : FLOORS[k].y;
          const cur = F[k].position.y;
          const next = cur + (target - cur) * Math.min(1, dt * 5);
          F[k].position.y = next;
          if (Math.abs(target - next) > .15) done = false; else F[k].position.y = target;
        }
        updateConns();
        if (activeRoute >= 0) buildRouteGeo(activeRoute);
        if (done) floorAnimating = false;
      }

      for (const g of trains) {
        const u = g.userData;
        const span = u.to - u.from;
        let t = (time * u.speed * 60 / Math.abs(span) + u.phase) % 2;
        if (t > 1) t = 2 - t;
        const e = t * t * (3 - 2 * t);
        const v = u.from + span * e;
        if (u.axis === 'x') g.position.x = v; else g.position.z = v;
      }

      if (routeCurve && routeBall) {
        routeT = (routeT + dt * .11) % 1.15;
        const tt = Math.min(routeT, 1);
        routeBall.position.copy(routeCurve.getPointAt(tt));
        routeBall.visible = routeT <= 1;
      }

      {
        const v = new THREE.Vector3(0, 0, -1).transformDirection(camera.matrixWorldInverse);
        const deg = Math.atan2(v.x, v.y) * 180 / Math.PI;
        document.getElementById('needle').style.transform = `rotate(${deg}deg)`;
      }

      const dist = camera.position.distanceTo(controls.target);
      app.classList.toggle('far', dist > 680);

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    tick();

    // intro
    flyTo(VIEWS.all, 2.2);
    document.querySelector('#views .chip[data-v="all"]').classList.add('on');
    setTimeout(() => toast('ドラッグで回転｜右の階数ボタンでフロア絞り込み｜⇕でフロア分解表示', 5200), 800);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
