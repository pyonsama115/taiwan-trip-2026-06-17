/* ============================================================
   ui.css — Taipei Station 3D Map design system
   Themes: classic (default) / gallery / signage
   ============================================================ */
:root {
  --paper: #fbf8f0;
  --card: #ffffff;
  --ink: #221f19;
  --ink2: #5d5547;
  --muted: #9b9181;
  --line: #ece4d2;
  --line2: #d9cdb5;
  --accent: #f15a35;
  --accent-ink: #ffffff;
  --tactic: #0e9fb3;
  --sun: #ffd24d;
  --sans: "Zen Kaku Gothic New", system-ui, sans-serif;
  --grotesk: "Archivo", system-ui, sans-serif;

  --panel-bg: rgba(255, 255, 252, .93);
  --panel-fg: var(--ink);
  --panel-fg2: var(--ink2);
  --panel-line: var(--line2);
  --panel-blur: blur(14px) saturate(1.1);
  --r-lg: 18px;
  --r-md: 12px;
  --r-sm: 9px;
  --shadow: 0 1px 2px rgba(64, 48, 24, .05), 0 6px 16px -8px rgba(64, 48, 24, .14), 0 20px 44px -20px rgba(64, 48, 24, .26);
  --shadow-pop: 0 2px 6px rgba(40, 30, 14, .08), 0 30px 70px -18px rgba(40, 30, 14, .45);
  --btn-bg: rgba(251, 248, 240, .85);
  --btn-fg: var(--ink2);
  --btn-line: var(--line2);
  --chip-bg: rgba(251, 248, 240, .8);
  --chip-fg: var(--ink2);
  --chip-line: var(--line2);
  --on-bg: var(--ink);
  --on-fg: #fdfbf4;
  --sec-fg: var(--muted);
  --field-bg: var(--paper);
}

/* ---- theme: gallery（白基調・余白広め・墨で締める）---- */
:root[data-theme="gallery"] {
  --panel-bg: rgba(255, 255, 255, .96);
  --panel-line: #eee8d9;
  --r-lg: 22px;
  --r-md: 14px;
  --r-sm: 11px;
  --shadow: 0 1px 2px rgba(64, 48, 24, .04), 0 14px 40px -16px rgba(64, 48, 24, .18);
  --btn-bg: #ffffff;
  --btn-line: #e7e0cf;
  --chip-bg: #ffffff;
  --chip-line: #e7e0cf;
  --field-bg: #fbf9f3;
}

/* ---- theme: signage（墨パネル×サイン的・地下街の案内板）---- */
:root[data-theme="signage"] {
  --panel-bg: rgba(34, 30, 23, .93);
  --panel-fg: #f7f2e4;
  --panel-fg2: #c9bfa9;
  --panel-line: rgba(255, 248, 226, .14);
  --r-lg: 14px;
  --r-md: 10px;
  --r-sm: 8px;
  --btn-bg: rgba(255, 250, 235, .07);
  --btn-fg: #d8cfb8;
  --btn-line: rgba(255, 248, 226, .18);
  --chip-bg: rgba(255, 250, 235, .07);
  --chip-fg: #d8cfb8;
  --chip-line: rgba(255, 248, 226, .18);
  --on-bg: var(--sun);
  --on-fg: #221f19;
  --sec-fg: #a3987f;
  --field-bg: rgba(255, 250, 235, .08);
  --shadow: 0 2px 4px rgba(20, 14, 4, .2), 0 24px 50px -18px rgba(20, 14, 4, .5);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
[hidden] { display: none !important; }

html, body {
  margin: 0; padding: 0; height: 100%;
  overflow: hidden;
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  touch-action: none;
  overscroll-behavior: none;
}

#app { position: fixed; inset: 0; }
#app canvas { display: block; }

.ic { display: block; flex: none; }
button { font-family: var(--sans); }
button:active { transform: scale(.96); }
button { transition: transform .12s ease, background-color .15s, border-color .15s, color .15s, box-shadow .15s; }

/* ================= CSS2D labels（地図上のラベルはテーマ非依存） ================= */
.lbl { pointer-events: none; white-space: nowrap; font-family: var(--sans); transform: translate(-50%, -50%); }
.lbl.clickable { pointer-events: auto; cursor: pointer; }
.lbl.zone {
  font-weight: 900; font-size: 12px; letter-spacing: .03em;
  padding: 3px 10px; border-radius: 999px;
  background: rgba(255, 255, 255, .93);
  border: 1.5px solid currentColor;
  box-shadow: 0 2px 8px rgba(60, 40, 25, .16);
}
.lbl.exit {
  font-weight: 800; font-size: 9px; letter-spacing: .05em;
  font-family: var(--grotesk);
  padding: 1.5px 5.5px; border-radius: 5px;
  background: rgba(34, 31, 25, .86); color: #fff;
  transition: opacity .3s;
  pointer-events: auto; cursor: pointer;
}
.far .lbl.exit { pointer-events: none; }
.lbl.spot {
  font-weight: 700; font-size: 10.5px; color: var(--ink2);
  text-shadow: 0 1px 3px rgba(251, 248, 240, .95), 0 0 6px rgba(251, 248, 240, .9);
  transition: opacity .3s;
}
.lbl.spot .ic { vertical-align: -2px; margin-right: 3px; }
.lbl.poi-badge {
  display: flex; align-items: center; gap: 4px;
  font-weight: 800; font-size: 10.5px;
  padding: 3.5px 10px; border-radius: 999px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, .3);
  text-shadow: none;
}
.lbl.st {
  font-weight: 700; font-size: 9.5px; color: #a99e8c; letter-spacing: .12em;
  text-shadow: 0 1px 3px rgba(251, 248, 240, .95);
  transition: opacity .3s;
}
.lbl.dir {
  font-weight: 800; font-size: 10.5px; color: var(--accent);
  background: rgba(255, 255, 255, .9); padding: 2px 9px; border-radius: 999px;
  border: 1.2px dashed var(--accent);
}
.lbl.mypin {
  font-family: var(--grotesk); font-weight: 800; font-size: 9.5px; letter-spacing: .08em;
  padding: 2.5px 8px; border-radius: 999px;
  background: var(--accent); color: #fff;
  box-shadow: 0 3px 10px rgba(0, 0, 0, .25);
}
.far .lbl.exit, .far .lbl.spot, .far .lbl.st { opacity: 0; pointer-events: none; }
/* 明示的にONにしたレイヤーのラベルはズームアウトしても隠さない */
.far.lyr-food .lbl.spot.cat-food, .far.lyr-shopping .lbl.spot.cat-shopping,
.far.lyr-wc .lbl.spot.cat-wc, .far.lyr-locker .lbl.spot.cat-locker { opacity: 1; pointer-events: auto; }

/* ================= panels ================= */
.panel {
  position: fixed; z-index: 10;
  background: var(--panel-bg);
  color: var(--panel-fg);
  backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
  border: 1px solid var(--panel-line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
}

.icon-btn {
  appearance: none; cursor: pointer;
  width: 34px; height: 34px; border-radius: var(--r-sm);
  border: 1px solid var(--btn-line); background: var(--btn-bg);
  color: var(--btn-fg);
  display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { color: var(--panel-fg); border-color: var(--muted); }
.icon-btn.on { background: var(--on-bg); border-color: var(--on-bg); color: var(--on-fg); }

/* ---------- header ---------- */
#head { top: 12px; left: 12px; width: min(338px, calc(100vw - 24px)); padding: 13px 14px 12px; }
#head .hrow { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
#head .brand { display: flex; gap: 10px; align-items: center; min-width: 0; }
#head .btxt { min-width: 0; }
#head .blogo { width: 31px; height: 31px; flex: none; filter: drop-shadow(0 2px 5px rgba(60, 40, 25, .22)); }
.mark-sm {
  flex: none; width: 34px; height: 34px; border-radius: 10px;
  background: var(--on-bg); color: var(--on-fg);
  display: none; place-items: center;
  font-weight: 900; font-size: 15px;
  box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .18);
}
#head h1 {
  margin: 0; font-size: 15px; font-weight: 900; letter-spacing: .01em;
  line-height: 1.32; color: var(--panel-fg);
  text-wrap: balance; word-break: keep-all;
}
.hbtns { display: flex; gap: 6px; flex: none; }
#fold .ic { transition: transform .25s; }
#head.folded #fold .ic { transform: rotate(180deg); }
#head .body { overflow: hidden auto; max-height: min(560px, calc(100dvh - 140px)); transition: max-height .3s ease, opacity .25s; touch-action: pan-y; scrollbar-width: thin; }
#head.folded .body { max-height: 0; opacity: 0; }

#langBtn {
  width: auto; padding: 0 10px; gap: 5px;
  font-weight: 800; font-size: 10.5px;
}
#langBtn [data-ic="globe"] { color: #38b6d8; }
#langMenu {
  position: fixed; z-index: 22;
  display: flex; flex-direction: column; gap: 2px;
  background: var(--panel-bg); border: 1px solid var(--panel-line);
  backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
  border-radius: var(--r-md); padding: 5px;
  box-shadow: var(--shadow-pop);
}
#langMenu[hidden] { display: none; }
#langMenu button {
  appearance: none; cursor: pointer; border: 0; border-radius: calc(var(--r-md) - 4px);
  background: none; text-align: left;
  padding: 10px 34px 10px 13px; min-width: 138px;
  font-weight: 700; font-size: 12.5px; color: var(--panel-fg2);
  position: relative;
}
#langMenu button:hover { background: var(--btn-bg); }
#langMenu button.on { color: var(--panel-fg); font-weight: 900; }
#langMenu button.on::after {
  content: ''; position: absolute; right: 12px; top: 50%;
  width: 9px; height: 5px; border-left: 2.5px solid var(--accent); border-bottom: 2.5px solid var(--accent);
  transform: translateY(-70%) rotate(-45deg);
}

/* ---- search trigger ---- */
#searchTopBtn { display: none; }
#searchBtnRow { margin-top: 11px; }
.search-pill {
  appearance: none; cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 9px 12px;
  border-radius: 999px; border: 1px solid var(--btn-line);
  background: var(--field-bg); color: var(--muted);
  font-weight: 700; font-size: 12px; text-align: left;
}
.search-pill:hover { border-color: var(--muted); color: var(--panel-fg2); }
.search-pill .sps-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.search-pill kbd {
  margin-left: auto; font-family: var(--grotesk); font-size: 9.5px; font-weight: 800;
  border: 1px solid var(--btn-line); border-radius: 5px; padding: 1px 6px; color: var(--muted);
}

/* ---- legend ---- */
.legend {
  display: flex; flex-wrap: wrap; gap: 4px 11px;
  margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--panel-line);
}
.legend span { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; color: var(--panel-fg2); }
.legend em { font-style: normal; white-space: nowrap; }
.legend i { width: 9px; height: 9px; border-radius: 3px; flex: none; background: var(--c, #999); }

.sec {
  margin-top: 12px;
  font-family: var(--grotesk); font-weight: 800; font-size: 8.5px;
  letter-spacing: .16em; text-transform: uppercase; color: var(--sec-fg);
}
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip {
  appearance: none; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 700; font-size: 11px;
  padding: 6px 12px; border-radius: 999px;
  border: 1.5px solid var(--chip-line);
  background: var(--chip-bg); color: var(--chip-fg);
  white-space: nowrap;
}
.chip > span { white-space: nowrap; }
.chip .ic { width: 13px; height: 13px; }
.chip:hover { border-color: var(--muted); color: var(--panel-fg); transform: translateY(-1px); }
.chip:active { transform: scale(.96); }
.chip.view.on { background: var(--on-bg); border-color: var(--on-bg); color: var(--on-fg); }
:root[data-theme="gallery"] .chip.view.on { background: var(--ink); border-color: var(--ink); color: #fdfbf4; }
:root[data-theme="gallery"] .chip.rt { border-color: var(--ink); color: var(--ink); }
:root[data-theme="gallery"] .chip.rt:hover { background: color-mix(in srgb, var(--ink) 8%, transparent); color: var(--ink); }
.chip.route { border-style: dashed; }
.chip.route.on { background: var(--on-bg); border-color: var(--on-bg); border-style: solid; color: var(--on-fg); }
.chip.shop.on { background: var(--on-bg); border-color: var(--on-bg); color: var(--on-fg); }
.chip.rt { border-style: solid; border-color: var(--accent); color: color-mix(in oklab, var(--accent) 72%, var(--ink)); background: transparent; font-weight: 800; }
.chip.rt:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); border-color: var(--accent); color: color-mix(in oklab, var(--accent) 72%, var(--ink)); }

/* グループ見出し（SPのストリップ内でのみ表示） */
.strip-lab { display: none; }

/* ---- mobile chip strip ---- */
#chipStrip {
  position: fixed; z-index: 9; left: 0; right: 0;
  top: calc(env(safe-area-inset-top, 0px) + 72px);
  display: none;
  padding: 2px 12px 8px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  pointer-events: auto;
}
#chipStrip::-webkit-scrollbar { display: none; }
#chipStrip {
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 14px, #000 calc(100% - 26px), transparent);
  mask-image: linear-gradient(to right, transparent 0, #000 14px, #000 calc(100% - 26px), transparent);
}
#chipStrip .chips { flex-wrap: nowrap; margin-top: 0; }
#chipStrip .chips .chips { display: contents; }
#chipStrip .chip {
  white-space: nowrap; flex: none;
  padding: 11px 16px; font-size: 12px;
  box-shadow: var(--shadow);
  background: var(--panel-bg);
  backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
}
/* 選択状態はストリップ内でも確実に墨背景×紙色文字（ID付き背景指定より優先） */
#chipStrip .chip.on { background: var(--on-bg); border-color: var(--on-bg); color: var(--on-fg); }

/* ---- elevator floor rail ---- */
#rail {
  top: max(172px, calc(50% - 200px)); right: 12px;
  max-height: calc(100dvh - 240px); overflow-y: auto; scrollbar-width: none;
  display: flex; flex-direction: column; align-items: center;
  padding: 7px 6px; gap: 3px;
}
#rail .flr {
  appearance: none; cursor: pointer;
  width: 42px; height: 36px; border-radius: var(--r-sm);
  border: 1.5px solid transparent;
  background: none; position: relative;
  font-family: var(--grotesk); font-weight: 800; font-size: 12px;
  color: var(--panel-fg2);
}
#rail .flr:hover { background: var(--btn-bg); color: var(--panel-fg); }
#rail .flr.on { background: var(--on-bg); color: var(--on-fg); box-shadow: 0 3px 10px rgba(34, 30, 20, .3); }
#rail .flr i {
  position: absolute; left: 5px; top: 5px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c, transparent);
}
#rail hr { width: 26px; border: 0; border-top: 1px dashed var(--panel-line); margin: 3px 0; }
#rail { transition: opacity .35s ease; }

/* ---- floor flag（選択フロアの真横に出て2秒で自動消去） ---- */
#floorFlag {
  top: 50%; right: 70px;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 13px; pointer-events: none;
  transform: translateY(-50%);
  overflow: hidden;
  transition: opacity .45s ease;
}
#floorFlag.pop { animation: flagin .25s cubic-bezier(.2, .9, .25, 1); }
#floorFlag.fade { opacity: 0; }
#floorFlag::after {
  content: ''; position: absolute; left: 0; bottom: 0; height: 2px;
  background: var(--accent); opacity: .55; width: 0;
}
#floorFlag.pop::after { animation: flagbar 2s linear forwards; }
@keyframes flagin { from { opacity: 0; transform: translate(6px, -50%); } to { transform: translateY(-50%); } }
@keyframes flagbar { from { width: 100%; } to { width: 0; } }
#floorFlag b { font-family: var(--grotesk); font-weight: 800; font-size: 13px; color: var(--accent); letter-spacing: .04em; }
#floorFlag span { font-size: 11px; font-weight: 700; color: var(--panel-fg2); max-width: 200px; }

/* ---- 選択中フロアの説明（画面下部固定） ---- */
#floorNow {
  left: 50%; bottom: max(14px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 9px;
  padding: 8px 15px; pointer-events: none; z-index: 9;
  animation: nowin .3s cubic-bezier(.2, .9, .25, 1);
  max-width: calc(100vw - 24px);
}
@keyframes nowin { from { opacity: 0; transform: translate(-50%, 8px); } }
#floorNow b { font-family: var(--grotesk); font-weight: 800; font-size: 13px; color: var(--accent); letter-spacing: .04em; flex: none; }
#floorNow span { font-size: 11px; font-weight: 700; color: var(--panel-fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#rail .tool { width: 42px; height: 36px; }
#rail .tool.on { background: var(--accent); border-color: var(--accent); color: #fff; }
#rail .cap {
  font-family: var(--grotesk); font-weight: 800; font-size: 7.5px;
  letter-spacing: .12em; color: var(--sec-fg); margin-top: 2px;
}

/* ---- right tools: compass / zoom ---- */
#sideTools {
  position: fixed; z-index: 10;
  top: 12px; right: 12px;

function ic(name, size = 18, sw = 2) {
  const d = P[name];
  if (!d) return '';
  return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${d}</svg>`;
}

/* Replace every element carrying data-ic="name" with its icon */
function injectIcons(root = document) {
  root.querySelectorAll('[data-ic]').forEach(el => {
    const size = +(el.dataset.icSize || 18);
    const sw = +(el.dataset.icSw || 2);
    el.innerHTML = ic(el.dataset.ic, size, sw);
  });
}

function buildWorld(scene) {
  const F = {};
  for (const k of FKEY) {
    F[k] = new THREE.Group();
    F[k].position.y = FLOORS[k].y;
    scene.add(F[k]);
  }
  const gRoute = new THREE.Group();
  scene.add(gRoute);

  const pickables = [];
  const i18nLabels = [];
  const exitObjs = [];
  const shopObjs = [];
  const trains = [];

  /* ---------- helpers ---------- */
  function makeLabel(text, cls, color) {
    const div = document.createElement('div');
    div.className = 'lbl ' + cls;
    if (text && typeof text === 'object') {
      i18nLabels.push({ el: div, txt: text });
      div.innerHTML = t(text);
    } else {
      div.innerHTML = text;
    }
    if (color) div.style.color = color;
    return new CSS2DObject(div);
  }

  /* ラベル(店名など)のタップでも対象の情報シートを開けるようにする */
  function clickableLabel(l, mesh, fk) {
    l.element.classList.add('clickable');
    l.element.addEventListener('click', e => {
      e.stopPropagation();
      if (!mesh.userData.info) return;
      const p = new THREE.Vector3();
      mesh.getWorldPosition(p);
      showInfo(mesh.userData.info, p, FLOORS[fk] ? fk : null);
    });
  }

  function mat(color, opacity) {
    const m = new THREE.MeshLambertMaterial({ color, transparent: true, opacity: opacity ?? 1 });
    m.userData.baseOp = opacity ?? 1;
    return m;
  }

  /* box(floorKey, x1,x2, z1,z2, h, color, opts) — 底面はフロアのローカルy0 */
  function box(fk, x1, x2, z1, z2, h, color, o = {}) {
    const w = x2 - x1, d = z2 - z1;
    const geo = new THREE.BoxGeometry(w, h, d);
    const m = new THREE.Mesh(geo, mat(color, o.opacity));

      pickables.push(m);
    }
    if (o.edges !== false && h > 1.4) {
      const eMat = new THREE.LineBasicMaterial({ color: COL.ink, transparent: true, opacity: .15 });
      eMat.userData.baseOp = .15;
      m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), eMat));
    }
    if (o.label) {
      const l = makeLabel(o.label, o.labelCls || 'zone', o.labelColor || hex(color));

  /* 寄棟屋根 */
  function hipRoof(fk, cx, cy, cz, w, d, h, color, op = .95) {
    const hw = w / 2, hd = d / 2, r = Math.max(w - d, 0) / 2;
    const verts = [
      -hw, 0, -hd, hw, 0, -hd, hw, 0, hd, -hw, 0, hd,
      -r, h, 0, r, h, 0
    ];
    const idx = [0, 1, 5, 0, 5, 4, 2, 3, 4, 2, 4, 5, 1, 2, 5, 3, 0, 4, 0, 3, 1, 1, 3, 2];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    const rm = new THREE.MeshLambertMaterial({ color, transparent: true, opacity: op, side: THREE.DoubleSide });
    rm.userData.baseOp = op;
    const mesh = new THREE.Mesh(geo, rm);
    mesh.position.set(cx, cy, cz);
    mesh.userData.floor = fk;
    const eMat = new THREE.LineBasicMaterial({ color: 0x4a2018, transparent: true, opacity: .2 });
    eMat.userData.baseOp = .2;
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 12), eMat));
    F[fk].add(mesh);
    return mesh;
  }

        const ent = i18nLabels.find(it => it.el === div);
        const span = document.createElement('span');
        span.innerHTML = div.innerHTML;
        div.innerHTML = ic(cat, 13);

      }
      // 視認性重視の塗りつぶしバッジ

      div.style.background = hex(c);
      div.style.color = '#fff';
    }
    l.position.y = (cat === 'wc' || cat === 'locker') ? 11 : 6;
    clickableLabel(l, m, fk);
    m.add(l);

        new THREE.BoxGeometry(axis === 'x' ? 11 : 6, 4.2, axis === 'x' ? 6 : 11), bodyM);
      if (axis === 'x') car.position.x = (i - 1) * 12.5; else car.position.z = (i - 1) * 12.5;
      car.position.y = 3.6;
      g.add(car);
    }
    if (axis === 'x') g.position.z = fixedCoord; else g.position.x = fixedCoord;
    g.userData = { axis, from, to, speed, phase: Math.random() };
    F[fk].add(g);
    trains.push(g);

  jZw: { p: [-160, 60, 'B1'] }
};
const NET_EDGES = [
  ['breeze', 'hall1f'], ['hall1f', 'traGate'], ['traGate', 'traPlat'],
  ['traGate', 'jK4'], ['jK4', 'jK3'], ['jK3', 'kMall'], ['jK3', 'jK2'], ['jK2', 'jZ0'],
  ['jZ0', 'zMall'], ['jZ0', 'z2'], ['jZ0', 'jZB1'], ['jZB1', 'mrtConc'],
  ['mrtConc', 'jB2a'], ['jB2a', 'blPlat'],
  ['mrtConc', 'jB2b'], ['jB2b', 'jB2c'], ['jB2c', 'jB3a'], ['jB3a', 'jB3b'], ['jB3b', 'jB4'], ['jB4', 'rPlat'],
  ['jB3a', 'jB3c'], ['jB3c', 'jB2d'], ['jB2d', 'traPlat'],
  ['traGate', 'jNP'], ['jNP', 'jY1'], ['jY1', 'yEast'], ['yEast', 'jYE'], ['jYE', 'rS'], ['rS', 'rM'], ['rM', 'r79'],
  ['yEast', 'jQ'], ['jQ', 'qSquare'],
  ['jY1', 'yC1'], ['yC1', 'yCenter'], ['yCenter', 'y14'], ['y14', 'yW2'], ['yW2', 'yWest'], ['yWest', 'jBM'], ['jBM', 'beimen'],
  ['traGate', 'jW1'], ['jW1', 'jW2'], ['jW2', 'jW3'], ['jW3', 'airA1'],
  ['y14', 'jA'], ['jA', 'airA1'],
  // MRT B1通路のスパインとZ区からの接続（M出口はここに自動接続される）
  ['zMall', 'jMa'], ['jZ0', 'jMb'], ['z2', 'jMc'],
  ['jMa', 'jMb'], ['jMb', 'jMc'], ['jMc', 'jMd'], ['jMd', 'jMe'], ['jMe', 'jMf'],
  ['zMall', 'jZw']
];
const NET_ADJ = {};
for (const [a, b] of NET_EDGES) {
  (NET_ADJ[a] = NET_ADJ[a] || []).push(b);
  (NET_ADJ[b] = NET_ADJ[b] || []).push(a);
}
function netCost(a, b) {
  const A = NET_NODES[a].p, B = NET_NODES[b].p;
  return Math.hypot(A[0] - B[0], A[1] - B[1]) + (A[2] !== B[2] ? 60 : 0);
}
/* ダイクストラ法（ノード数が少ないのでO(n^2)で十分） */
function findPath(from, to) {
  const dist = { [from]: 0 }, prev = {}, done = new Set();
  for (;;) {
    let u = null, best = Infinity;
    for (const k in dist) if (!done.has(k) && dist[k] < best) { best = dist[k]; u = k; }
    if (u == null || u === to) break;
    done.add(u);
    for (const v of NET_ADJ[u] || []) {
      const nd = dist[u] + netCost(u, v);
      if (nd < (dist[v] ?? Infinity)) { dist[v] = nd; prev[v] = u; }
    }
  }
  if (dist[to] == null) return null;
  const ids = [to];
  while (ids[0] !== from) ids.unshift(prev[ids[0]]);
  return { ids, len: dist[to] };
}

  (NET_ADJ[b] = NET_ADJ[b] || []).push(a);

function nearestNetNode(x, z, fk, baseOnly) {
  // フロアはハードフィルタにしない（F1などノードが疎な階で遠方ノードに
  // 吸着し、出発・到着が同一ノードになって経路探索を素通りするバグ防止）。
  // 別フロアは netCost と同じ +60 のペナルティで扱う。
  let best = null, bd = Infinity;
  for (const k in NET_NODES) {
    if (baseOnly && /^(x_|s_)/.test(k)) continue;
    if (!NET_ADJ[k]) continue;

    const d = Math.hypot(p[0] - x, p[1] - z) + (p[2] === fk ? 0 : 60);
    if (d < bd) { bd = d; best = k; }
  }
  return best;
}

/* ---------- 自由地点（ピン/タップ位置）の経路端点解決 ---------- */
// 地上(F1)から地下網へは必ず「出入口」(出口マーカー・駅舎・北門站・機捷A1・京站)を
// 経由する。出入口の真上で垂直に潜る/浮上する経由点(via)を返す
const STREET_ENTRANCE_IDS = ['hall1f', 'beimen', 'airA1', 'qSquare'];
function resolveEndpoint(x, z, fk) {
  if (fk === 'F1') {
    let best = null, bd = Infinity;
    for (const k in NET_NODES) {
      if (!NET_ADJ[k]) continue;
      if (!/^x_/.test(k) && !STREET_ENTRANCE_IDS.includes(k)) continue;
      const p = NET_NODES[k].p;
      const d = Math.hypot(p[0] - x, p[1] - z);
      if (d < bd) { bd = d; best = k; }
    }
    if (best) {
      const p = NET_NODES[best].p;
      return { node: best, via: p[2] === 'F1' ? [] : [[p[0], p[1], 'F1']] };
    }
  }
  return { node: nearestNetNode(x, z, fk, false), via: [] };
}

/* 出発・到着（ノードID {id} または自由地点 {x,z,fk}）から経路を組み立てて再生する共通処理 */
function runNetRoute(A, B, nmA, nmB) {
  const resolve = E => E.id
    ? { node: E.id, pre: null, via: [] }
    : Object.assign({ pre: [E.x, E.z, E.fk] }, resolveEndpoint(E.x, E.z, E.fk));
  const ea = resolve(A), eb = resolve(B);
  if (!ea.node || !eb.node) return false;
  let pts;
  if (ea.node === eb.node) {
    // 両端が同じノードに解決: 地上同士なら直接結ぶ、それ以外はノード経由
    pts = (ea.pre && eb.pre && ea.pre[2] === 'F1' && eb.pre[2] === 'F1')
      ? [] : [NET_NODES[ea.node].p];
  } else {
    const path = findPath(ea.node, eb.node);
    if (!path) return false;
    pts = path.ids.map(id => NET_NODES[id].p).slice();
  }
  for (let i = ea.via.length - 1; i >= 0; i--) pts.unshift(ea.via[i]);
  for (const v of eb.via) pts.push(v);
  // ほぼ同一点の重複は曲線が壊れるので追加しない
  const distinct = (p, q) => Math.hypot(p[0] - q[0], p[1] - q[1]) > 2 || p[2] !== q[2];
  if (ea.pre && (!pts.length || distinct(ea.pre, pts[0]))) pts.unshift(ea.pre);
  if (eb.pre && (!pts.length || distinct(eb.pre, pts[pts.length - 1]))) pts.push(eb.pre);
  if (pts.length < 2) { toast(t(UI.rtSame), 2000); return false; }
  // 所要時間は最終的な点列から計算（フロア移動は+40相当）
  let len = 0;
  for (let i = 1; i < pts.length; i++) {
    len += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
    if (pts[i][2] !== pts[i - 1][2]) len += 40;
  }
  const mins = Math.max(1, Math.round(len / 70));
  playRoute({
    name: mapTx(l => nmA(l) + ' → ' + nmB(l)),
    desc: mapTx(l => RT_DESC[l](nmA(l), nmB(l), mins)),
    pts
  });
  return true;
}

/* 長い区間に中間点を打ち、CatmullRom曲線が通路の角をショートカットしないようにする */
function expandRoute(r) {
  const out = [];
  const pts = r.pts;
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    if (i && pts[i - 1][2] === p[2]) {   // 同一フロア区間のみ直線補間
      const q = pts[i - 1];
      const d = Math.hypot(p[0] - q[0], p[1] - q[1]);
      const n = Math.floor(d / 30);
      for (let j = 1; j < n; j++) {
        const tt = j / n;
        out.push([q[0] + (p[0] - q[0]) * tt, q[1] + (p[1] - q[1]) * tt, p[2]]);
      }
    }
    out.push(p);
  }
  return out;
}
function routePts(r) {
  return expandRoute(r).map(p => new THREE.Vector3(p[0], F[p[2]].position.y + 4, p[1]));
}
function buildRouteGeo(r) {
  routeCurve = new THREE.CatmullRomCurve3(routePts(r), false, 'catmullrom', .08);
  if (routeTube) { routeTube.geometry.dispose(); gRoute.remove(routeTube); }
  routeTube = new THREE.Mesh(
    new THREE.TubeGeometry(routeCurve, 110, 1.3, 8),
    // 通路オブジェクトに埋もれないよう常に最前面に描く
    new THREE.MeshBasicMaterial({ color: SETTINGS.accent, transparent: true, opacity: .85, depthTest: false })
  );
  routeTube.renderOrder = 50;
  gRoute.add(routeTube);
}
function buildRouteFloors(r) {
  const pts = routePts(r);
  const fls = expandRoute(r).map(p => p[2]);   // routePtsと同じ細分化でインデックスを揃える
  const M = 180;
  routeFloorsU = [];
  for (let j = 0; j < M; j++) {
    const p = routeCurve.getPointAt(j / (M - 1));
    let bi = 0, bd = Infinity;
    pts.forEach((q, qi) => {
      const d = q.distanceToSquared(p);
      if (d < bd) { bd = d; bi = qi; }
    });
    routeFloorsU.push(fls[bi]);
  }
}
function setRouteFloor(fk, doToast = true) {
  if (FOCUS === fk) return;
  FOCUS = fk;
  applyFocus();
  if (doToast && !routeToastDone) toast(`${fk} — ${t(FLOORS[fk].name)}`, 1800);
}
function floorAtT(tt) {
  return routeFloorsU[Math.min(routeFloorsU.length - 1, Math.round(Math.min(tt, 1) * (routeFloorsU.length - 1)))];
}

  pFlow.innerHTML = '';
  routeMs.forEach((m, j) => {

function playRoute(r) {

  if (!exploded) {
    routeAutoExplode = true;

  routeBall = new THREE.Group();

    // transparent:true で半透明描画パス(マップの建物群より後)に乗せないと、
    // 不透明扱い→半透明ボックスに上塗りされてオブジェクト内で見えなくなる
    const wMat = o => new THREE.MeshBasicMaterial({ color: 0xffd24d, depthTest: false, depthWrite: false, transparent: true, ...(o || {}) });
    const oMat = () => new THREE.MeshBasicMaterial({ color: 0x221f19, depthTest: false, depthWrite: false, transparent: true, side: THREE.BackSide });
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(1.6, 3.6, 4, 10), wMat());
    body.position.y = 6.2;
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.7, 14, 14), wMat());
    head.position.y = 10.6;
    // 墨色アウトライン（背面拡大法）で背景に紛れないように
    const bodyOut = new THREE.Mesh(body.geometry, oMat());
    bodyOut.position.copy(body.position);
    bodyOut.scale.setScalar(1.22);
    const headOut = new THREE.Mesh(head.geometry, oMat());
    headOut.position.copy(head.position);
    headOut.scale.setScalar(1.28);
    const legGeo = new THREE.CylinderGeometry(.55, .5, 3.8, 8);
    const legL = new THREE.Group(), legR = new THREE.Group();
    const lmesh = new THREE.Mesh(legGeo, wMat());
    lmesh.position.y = -1.9;
    legL.add(lmesh); legR.add(lmesh.clone());
    legL.position.set(.85, 4.4, 0); legR.position.set(-.85, 4.4, 0);
    // 二重リング: 内側は面、外側はくっきりした輪（内側は脈動）
    const haloFill = new THREE.Mesh(new THREE.RingGeometry(4.2, 7.2, 32), wMat({ transparent: true, opacity: .4 }));
    haloFill.rotation.x = -Math.PI / 2;
    haloFill.position.y = .25;
    const haloEdge = new THREE.Mesh(new THREE.RingGeometry(7.2, 8.4, 32), wMat({ transparent: true, opacity: .95 }));
    haloEdge.rotation.x = -Math.PI / 2;
    haloEdge.position.y = .3;
    routeBall.add(bodyOut, headOut, body, head, legL, legR, haloFill, haloEdge);
    routeBall.traverse(o => { o.renderOrder = 60; });
    bodyOut.renderOrder = headOut.renderOrder = 59;   // アウトラインは本体の下に描く
    routeBall.userData.legs = [legL, legR];
    routeBall.userData.halo = haloFill;
    routeBall.scale.setScalar(1.4);                   // 全体を一回り大きく
  }
  routeT = 0;
  gRoute.add(routeBall);
  routeFollow = true;
  routePaused = false;
  routeDone = false;
  routeToastDone = false;

   ============================================================ */
const searchOv = $('#searchOv');
const sInput = $('#sInput');
const sResults = $('#sResults');
let sIndex = null, sItems = [], sSel = 0;

function buildIndex() {
  const seen = new Set();
  sIndex = [];
  for (const m of pickables) {
    const inf = m.userData.info;
    if (!inf || seen.has(inf) || inf.isPin) continue;
    seen.add(inf);
    const hay = Object.values(typeof inf.name === 'object' ? inf.name : { v: inf.name })
      .join(' ').toLowerCase();
    sIndex.push({ inf, mesh: m, hay });
  }
}
function searchQuery(q) {
  q = q.trim().toLowerCase();
  if (!sIndex) buildIndex();
  if (!q) return [];
  const starts = [], incl = [];
  for (const e of sIndex) {
    const i = e.hay.indexOf(q);
    if (i < 0) continue;
    (i === 0 || e.hay[i - 1] === ' ' ? starts : incl).push(e);
    if (starts.length + incl.length > 60) break;
  }
  return starts.concat(incl).slice(0, 12);
}
function hlMatch(name, q) {
  if (!q) return name;
  const i = name.toLowerCase().indexOf(q);
  if (i < 0) return name;
  return name.slice(0, i) + '<mark>' + name.slice(i, i + q.length) + '</mark>' + name.slice(i + q.length);
}
function renderResults(q) {
  sItems = searchQuery(q);
  sSel = 0;
  const ql = q.trim().toLowerCase();
  if (!ql) { sResults.innerHTML = ''; return; }
  if (!sItems.length) {
    sResults.innerHTML = `<div class="empty">${t(UI.sEmpty)}</div>`;
    return;
  }
  sResults.innerHTML = sItems.map((e, i) => {
    const fl = typeof e.inf.floor === 'object' ? t(e.inf.floor) : (e.inf.floor || '');
    const tag = e.inf.tag ? `<small>${t(e.inf.tag)}</small>` : '';
    return `<button class="srs${i === 0 ? ' sel' : ''}" data-i="${i}">
      <span class="dot" style="--c:${e.inf.color || '#999'}"></span>
      <span class="nm">${hlMatch(t(e.inf.name), ql)}${tag}</span>
      <span class="fl">${fl}</span>
    </button>`;
  }).join('');
}
function openSearch() {
  searchOv.classList.add('show');
  sInput.value = '';
  sResults.innerHTML = '';
  setTimeout(() => sInput.focus(), 60);
}
function closeSearch() {
  searchOv.classList.remove('show');
  sInput.blur();
}
function pickResult(i) {
  const e = sItems[i];
  if (!e) return;
  closeSearch();
  // 店レイヤーが必要なら自動でON
  const cat = e.mesh.userData.shopCat;
  if (cat && !layersOn[cat]) {
    layersOn[cat] = true;
    document.querySelectorAll(`#shops .chip[data-s="${cat}"]`).forEach(b => b.classList.add('on'));
  }
  const fk = e.mesh.userData.floor;
  if (FLOORS[fk]) { FOCUS = fk; } else { FOCUS = null; }
  applyFocus();
  const p = new THREE.Vector3();
  e.mesh.getWorldPosition(p);
  flyToPoint(p, 190);
  showInfo(e.inf, p, FLOORS[fk] ? fk : null);
}
sInput.addEventListener('input', () => renderResults(sInput.value));
sInput.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (!sItems.length) return;
    sSel = (sSel + (e.key === 'ArrowDown' ? 1 : -1) + sItems.length) % sItems.length;
    sResults.querySelectorAll('.srs').forEach((el, i) => el.classList.toggle('sel', i === sSel));
    sResults.querySelectorAll('.srs')[sSel]?.scrollIntoViewIfNeeded?.();
  } else if (e.key === 'Enter') {
    pickResult(sSel);
  } else if (e.key === 'Escape') {
    closeSearch();
  }
});
sResults.addEventListener('click', e => {
  const b = e.target.closest('.srs');
  if (b) pickResult(+b.dataset.i);
});

  o.textContent = id === '_pin'
    ? (pinState ? pinState.fk + ' · ' + t(UI.pinName) : '')
    : NET_NODES[id].p[2] + ' · ' + t(NET_NODES[id].name);
  return o;
}
function fillRtSelects() {
  const ids = destIds();
  for (const sel of [rtFrom, rtTo]) {
    const cur = sel.value;
    sel.innerHTML = '';
    if (pinState) sel.appendChild(rtOption('_pin'));   // マイピンの位置から/へ
    for (const id of ids) sel.appendChild(rtOption(id));
    if (cur === '_pin' && pinState) sel.value = '_pin';
    else if (cur && ids.includes(cur)) sel.value = cur;
    else if (cur && NET_NODES[cur]) {
      // 絞り込み対象外でも選択中の行き先は先頭に残す
      sel.insertBefore(rtOption(cur), sel.firstChild);
      sel.value = cur;
    }
  }
}
$('#rtFilter').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  rtKind = b.dataset.k;
  document.querySelectorAll('#rtFilter button').forEach(x => x.classList.toggle('on', x === b));
  fillRtSelects();
});
$('#rtOpen').onclick = () => {
  fillRtSelects();
  if (!rtFrom.value) rtFrom.value = 'traGate';
  if (!rtTo.value || rtTo.value === rtFrom.value) rtTo.value = 'qSquare';
  rtModal.classList.add('show');
};
rtModal.addEventListener('click', e => { if (e.target === rtModal) rtModal.classList.remove('show'); });
$('#rtSwap').onclick = () => {
  const a = rtFrom.value;
  rtFrom.value = rtTo.value;
  rtTo.value = a;
};
$('#rtGo').onclick = () => {
  const av = rtFrom.value, bv = rtTo.value;
  if (av === bv) { toast(t(UI.rtSame), 2000); return; }
  // 発着地がトイレ/ロッカー/お店/出口なら該当レイヤーを自動ON
  ensureLayerOn(NET_NODES[av]?.cat);
  ensureLayerOn(NET_NODES[bv]?.cat);
  const mk = v => v === '_pin'
    ? (pinState ? { x: pinState.x, z: pinState.z, fk: pinState.fk } : null)
    : { id: v };
  const A = mk(av), B = mk(bv);
  if (!A || !B) return;
  const nmOf = v => v === '_pin'
    ? (l => UI.pinName[l] ?? UI.pinName.en)
    : (l => NET_NODES[v].name[l] ?? NET_NODES[v].name.en);
  if (runNetRoute(A, B, nmOf(av), nmOf(bv))) {
    activeRoute = -2;
    rtModal.classList.remove('show');
  }
};

/* ============================================================
   クリック＆ホバー（ピッキング）
   ============================================================ */
const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2();
let downXY = null, hovered = null;

function pickAt(cx, cy) {
  ptr.set((cx / innerWidth) * 2 - 1, -(cy / innerHeight) * 2 + 1);
  ray.setFromCamera(ptr, camera);
  const hits = ray.intersectObjects(pickables.filter(m => {
    const fk = m.userData.floor;
    if (m.userData.shopCat) return layersOn[m.userData.shopCat] && (!FOCUS || FOCUS === fk);
    if (fk === '_exit') return m.visible;
    if (fk === '_conn') {
      const c = m.userData.conn;
      return !FOCUS || FOCUS === c.a || FOCUS === c.b;
    }
    return !FOCUS || FOCUS === fk;
  }), false);
  return hits.length ? hits[0].object : null;
}
function placePinAt(cx, cy) {
  ptr.set((cx / innerWidth) * 2 - 1, -(cy / innerHeight) * 2 + 1);
  ray.setFromCamera(ptr, camera);
  const hits = ray.intersectObjects(scene.children, true);
  const tryPass = strict => {
    for (const h of hits) {
      // 非表示オブジェクト（B階フォーカス中の駅舎など）と
      // ピン設置不可（通路・道路・地面）はレイキャストから除外
      let vis = true, noPin = false;
      for (let o2 = h.object; o2; o2 = o2.parent) {
        if (o2.visible === false) { vis = false; break; }
        if (o2.userData && o2.userData.noPin) { noPin = true; break; }
      }
      if (!vis || noPin) continue;
      // 厳格パス: ほぼ透明な面（フロアスラブ・透明な地面）は「見えている階」と
      // 違う階にピンが立つ原因なので除外。どこにも当たらなければ緩和パスで許可
      if (strict) {
        const mt = h.object.material;
        if (mt && mt.transparent && (mt.opacity ?? 1) < .05) continue;
      }
      let o = h.object, fk = null;
      while (o) {
        for (const k of FKEY) if (F[k] === o) { fk = k; break; }
        if (fk) break;
        o = o.parent;
      }
      if (!fk) continue;
      if (FOCUS && fk !== FOCUS) continue;
      savePin(h.point.x, h.point.z, fk);
      pinArmed = false;
      pinBtnEl.classList.remove('armed');
      return true;
    }
    return false;
  };
  const ok = tryPass(true) || tryPass(false);
  if (!ok) toast(t(UI.pinNo), 2400);   // 置けない場所（武装状態は維持して再タップ可能）
  return ok;
}

renderer.domElement.addEventListener('pointerdown', e => { downXY = [e.clientX, e.clientY]; });
renderer.domElement.addEventListener('pointerup', e => {
  if (!downXY) return;
  const dx = e.clientX - downXY[0], dy = e.clientY - downXY[1];
  downXY = null;
  if (dx * dx + dy * dy > 40) return;
  if (pinArmed) { placePinAt(e.clientX, e.clientY); return; }
  const m = pickAt(e.clientX, e.clientY);
  if (m) {
    const p = new THREE.Vector3();
    m.getWorldPosition(p);
    const fk = m.userData.floor;
    showInfo(m.userData.info, p, FLOORS[fk] ? fk : null);
  }
});
renderer.domElement.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch') return;
  const m = pickAt(e.clientX, e.clientY);
  if (hovered && hovered !== m) {
    hovered.material.emissive?.setHex(0x000000);
    hovered = null;
  }
  if (m && m !== hovered) {
    hovered = m;
    m.material.emissive?.setHex(0x2a2208);
    // 出口マーカーはホバーだけで説明シートを表示
    const inf = m.userData.info;
    if (inf && inf.tag === TAG.exit) {
      const p = new THREE.Vector3();
      m.getWorldPosition(p);
      const fk = m.userData.floor;
      showInfo(inf, p, FLOORS[fk] ? fk : null);
    }
  }
  renderer.domElement.style.cursor = pinArmed ? 'crosshair' : (m ? 'pointer' : '');
});

/* ============================================================
   モバイル：チップをストリップへ移動
   ============================================================ */
const stripChips = $('#stripChips');
const secBlocks = [['secViews', 'views'], ['secRoutes', 'routes'], ['secShops', 'shops']];
const mq = matchMedia('(max-width: 700px)');
function relayout() {
  if (mq.matches) {
    for (const [, id] of secBlocks) stripChips.appendChild(document.getElementById(id));
  } else {
    for (const [secId, id] of secBlocks) document.getElementById(secId).after(document.getElementById(id));
  }
}
mq.addEventListener?.('change', relayout);
relayout();

/* ============================================================
   キーボードショートカット（PC）
   ============================================================ */
const FLOOR_KEYS = { '1': 'F2', '2': 'F1', '3': 'B1', '4': 'B2', '5': 'B3', '6': 'B4' };
addEventListener('keydown', e => {
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'select' || tag === 'textarea' || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === '/') { e.preventDefault(); openSearch(); return; }
  if (e.key === 'Escape') {
    if (searchOv.classList.contains('show')) { closeSearch(); return; }
    if (guideEl.classList.contains('show')) { hideGuide(); return; }
    if (rtModal.classList.contains('show')) { rtModal.classList.remove('show'); return; }
    infoEl.classList.remove('show', 'lifted');
    return;
  }
  if (searchOv.classList.contains('show')) return;
  if (FLOOR_KEYS[e.key]) { setFloorFocus(FLOOR_KEYS[e.key]); return; }
  if (e.key === 'e' || e.key === 'E') { toggleExplode(); return; }
  if (e.key === 'f' || e.key === 'F') { FOCUS = null; applyFocus(); flyTo(VIEWS.all, 1.1); return; }
  if (e.key === '+' || e.key === '=') { zoomBy(.78); return; }
  if (e.key === '-') { zoomBy(1.28); return; }
});

/* ============================================================
   loop
   ============================================================ */
updateConns();
updateExits();
applyTheme('classic');
setLang(getLang());
applyShopLayers();
buildIndex();
const clock = new THREE.Clock();
let time = 0;

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  time += dt;

  if (camAnim) {
    camAnim.t = Math.min(1, camAnim.t + dt / camAnim.dur);
    const k = 1 - Math.pow(1 - camAnim.t, 3);
    camera.position.lerpVectors(camAnim.p0, camAnim.p1, k);
    controls.target.lerpVectors(camAnim.t0, camAnim.t1, k);
    if (camAnim.t >= 1) camAnim = null;
  }

  if (floorAnimating) {
    let done = true;
    for (const k of FKEY) {
      const target = exploded ? FLOORS[k].ey : FLOORS[k].y;
      const cur = F[k].position.y;
      const next = cur + (target - cur) * Math.min(1, dt * 5);
      F[k].position.y = next;
      if (Math.abs(target - next) > .15) done = false; else F[k].position.y = target;
    }
    {
      // 駅舎の屋根はF1の子なので、分解時はF2より上へ逃がす（2Fの突き抜け防止）
      const rTarget = exploded ? 130 : 24;
      const rCur = stationRoof.position.y;
      const rNext = rCur + (rTarget - rCur) * Math.min(1, dt * 5);
      stationRoof.position.y = rNext;
      if (Math.abs(rTarget - rNext) > .15) done = false; else stationRoof.position.y = rTarget;
    }
    updateConns();
    updateExits();
    if (activeRouteObj) buildRouteGeo(activeRouteObj);
    if (done) floorAnimating = false;
  }

  if (SETTINGS.trains) {
    for (const g of trains) {
      const u = g.userData;
      const span = u.to - u.from;
      let tt = (time * u.speed * 60 / Math.abs(span) + u.phase) % 2;
      if (tt > 1) tt = 2 - tt;
      const e = tt * tt * (3 - 2 * tt);
      const v = u.from + span * e;
      if (u.axis === 'x') g.position.x = v; else g.position.z = v;
    }
  }

  if (pinGroup) {
    const ring = pinGroup.getObjectByName('pinring');
    if (ring) {
      const s = 1 + Math.sin(time * 3) * .25;
      ring.scale.set(s, s, 1);
      ring.material.opacity = .2 + .18 * (1 + Math.sin(time * 3 + Math.PI)) / 2;
    }
  }

  if (routeCurve && routeBall) {
    if (!routePaused && !seekDrag && !routeDone) {
      routeT += dt * .062;
      if (routeT >= 1) {
        routeT = 1;
        routeDone = true;
        routePaused = true;
        routeToastDone = true;
        playPauseUI();
      }
      pSeek.value = Math.round(routeT * 1000);
      pSeek.style.setProperty('--p', routeT);
    }
    const p = routeCurve.getPointAt(Math.min(routeT, 1));
    routeBall.position.copy(p);
    const guiding = !routeDone && (!routePaused || seekDrag);
    // 進行方向を向き、歩行モーション（足の振り＋上下のバウンス）
    const tan = routeCurve.getTangentAt(Math.min(routeT, 1));
    routeBall.rotation.y = Math.atan2(tan.x, tan.z);
    const legs = routeBall.userData.legs;
    if (legs) {
      const walking = !routePaused && !routeDone;
      const ph = performance.now() / 1000 * 8;
      const sw = walking ? Math.sin(ph) * .55 : 0;
      legs[0].rotation.x = sw;
      legs[1].rotation.x = -sw;
      if (walking) routeBall.position.y += Math.abs(Math.sin(ph)) * .5;
    }
    // 足元リングの脈動（ピンのリングと同じ呼吸感）
    const wHalo = routeBall.userData.halo;
    if (wHalo) {
      const s = 1 + Math.sin(time * 3) * .22;
      wHalo.scale.set(s, s, 1);
      wHalo.material.opacity = .3 + .2 * (1 + Math.sin(time * 3 + Math.PI)) / 2;
    }
    if (routeFloorsU && guiding) setRouteFloor(floorAtT(routeT));
    updateMilestoneUI();
    if (routeFollow && !camAnim && guiding) {
      // 進行方向の斜め後ろ上空から、少し先を見るチェイスカメラ
      const k = 1 - Math.pow(.002, dt);
      const dir = tan.clone().setY(0);
      if (dir.lengthSq() < 1e-4) dir.set(0, 0, 1);
      dir.normalize();
      const side = new THREE.Vector3(-dir.z, 0, dir.x);
      const desired = p.clone()
        .addScaledVector(dir, -150)
        .addScaledVector(side, 55);
      desired.y = p.y + 135;
      camera.position.lerp(desired, k);
      const look = p.clone().addScaledVector(dir, 45);
      controls.target.lerp(look, k);
    }
  }

  {
    const v = new THREE.Vector3(0, 0, -1).transformDirection(camera.matrixWorldInverse);
    const deg = Math.atan2(v.x, v.y) * 180 / Math.PI;
    $('#needle').style.transform = `rotate(${deg}deg)`;
  }

  const dist = camera.position.distanceTo(controls.target);
  app.classList.toggle('far', dist > SETTINGS.labelFar && !FOCUS);

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
tick();

/* ---------- intro ---------- */
const bootWait = Math.max(0, 4000 - (Date.now() - (window.__bootT0 || Date.now())));
setTimeout(() => {
  const boot = $('#boot');
  if (boot) { boot.classList.add('off'); setTimeout(() => boot.remove(), 700); }
}, bootWait);
// 初期表示はB1（地下街・台鉄高鉄改札）を選択した状態で開始
FOCUS = 'B1';
applyFocus();
flyToFloor('B1');
setTimeout(() => toast(t(TX.intro), 5200), bootWait + 800);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
});
</script>
